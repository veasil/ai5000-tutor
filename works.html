<main>
  <section class="content wrap">
    <div class="page-head">
      <h1>🎨 创客作品墙</h1>

    </div>

</footer>

<script>
  const works=[
    {emoji:'🤖',bg:'var(--primary)',title:'会讲笑话的垃圾分类机器人',who:'小伍创客 3391',power:'创心力',like:128},
    {emoji:'💊',bg:'var(--primary-deep)',title:'帮奶奶认药的语音小助手',who:'小伍创客 5180',power:'沟通力',like:96},
    {emoji:'🛡️',bg:'var(--blue-deep)',title:'校园反霸凌求助小程序',who:'小伍创客 2074',power:'安全力',like:211},
    {emoji:'🖼️',bg:'var(--blue)',title:'古诗词 AI 配画',who:'小伍创客 6627',power:'创心力',like:74},
    {emoji:'🎧',bg:'var(--primary-bright)',title:'听声音猜情绪的小游戏',who:'小伍创客 4412',power:'实感力',like:153},
    {emoji:'💧',bg:'var(--blue-deep)',title:'节约用水提醒机器人',who:'小伍创客 8890',power:'脑波力',like:67}
  ];
  document.getElementById('grid').innerHTML=works.map(function(w){
    return '<article class="work reveal">'
      +'<div class="thumb" style="background:'+w.bg+'">'+w.emoji+'</div>'
      +'<div class="body">'
      +'<div class="wtitle">'+w.title+'</div>'
      +'<div class="author"><span class="who"><span class="dot"></span>'+w.who+'</span><span class="ftag">'+w.power+'</span></div>'
      +'<div class="wfoot"><span class="like">❤ '+w.like+'</span><button class="play">▶ 试玩</button></div>'
      +'</div></article>';
  }).join('');
  const io=new IntersectionObserver(function(es){es.forEach(function(e){if(e.isIntersecting){e.target.classList.add('in');io.unobserve(e.target);}});},{threshold:0.1});
  document.querySelectorAll('.reveal').forEach(function(el,i){el.style.transitionDelay=(i%3*60)+'ms';io.observe(el);});
</script>
</body>
